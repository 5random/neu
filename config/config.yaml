# ---------------------------------------------------------------------------
# CVD-Tracker configuration (generated)
# Edit carefully — indentation defines structure
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Metadata
# ---------------------------------------------------------------------------
metadata:
  version: '1.0'
  description: CVD-Tracker
  cvd_id: 0
  cvd_name: Instanz
  released_at: '2023-01-01'

# ---------------------------------------------------------------------------
# Webcam
# ---------------------------------------------------------------------------
webcam:
  camera_index: 1
  default_resolution:
    width: 1920
    height: 1080
  fps: 30
  resolution:
    - width: 320
      height: 240
    - width: 352
      height: 288
    - width: 640
      height: 480
    - width: 800
      height: 600
    - width: 1024
      height: 768
    - width: 1280
      height: 720
    - width: 1280
      height: 960
    - width: 1280
      height: 1024
    - width: 1920
      height: 1080

# ---------------------------------------------------------------------------
# UVC Controls
# ---------------------------------------------------------------------------
uvc_controls:
  brightness: 0
  hue: 0
  contrast: 16
  saturation: 64
  sharpness: 2
  gamma: 164
  white_balance:
    auto: true
    value: 4000
  gain: 10
  backlight_compensation: 42
  exposure:
    auto: true
    value: -6

# ---------------------------------------------------------------------------
# Motion Detection
# ---------------------------------------------------------------------------
motion_detection:
  region_of_interest:
    enabled: true
    x: 374
    y: 248
    width: 1000
    height: 511
  sensitivity: 0.1
  background_learning_rate: 0.005
  min_contour_area: 252

# ---------------------------------------------------------------------------
# Measurement
# ---------------------------------------------------------------------------
measurement:
  auto_start: false
  session_timeout_minutes: 60
  save_alert_images: true
  image_save_path: ./alerts/
  image_format: jpg
  image_quality: 85
  alert_delay_seconds: 300
  max_alerts_per_session: 5
  alert_check_interval: 5.0
  alert_cooldown_seconds: 300
  alert_include_snapshot: true
  inactivity_timeout_minutes: 60
  motion_summary_interval_seconds: 60
  enable_motion_summary_logs: true
  history_path: data/history

# ---------------------------------------------------------------------------
# E‑Mail
# ---------------------------------------------------------------------------
email:
  website_url: http://localhost:8080/
  recipients:
    - user@example.com
  smtp_server: mail.tuhh.de
  smtp_port: 25
  sender_email: CHANGE_ME@tuhh.de
  templates:
    alert:
      subject: 'CVD-TRACKER{cvd_id}-{cvd_name}-Alert: no motion detected - {timestamp}'
      body: |-
        Movement has not been detected since {timestamp}!
        Please check the issue via the web application at: {website_url}.

        Details:
        CVD-ID: {cvd_id}
        CVD-Name: {cvd_name}
        Session-ID: {session_id}
        Last motion registered at: {last_motion_time}
        Camera: Index {camera_index}
        Sensitivity: {sensitivity}
        ROI enabled: {roi_enabled}

        Attached is the current webcam image.
    measurement_start:
      subject: 'CVD-TRACKER{cvd_id}-{cvd_name}: Measurement started - {timestamp}'
      body: |+
        CVD-Tracker{cvd_id}-{cvd_name} Measurement Started
        A new measurement session has started at {timestamp}.

        You can monitor the session via the web application at: {website_url}.

        Details:
           CVD-ID:         {cvd_id}
           CVD-Name:       {cvd_name}
           Website URL:    {website_url}

           Session-ID:     {session_id}
           Last motion registered at: {last_motion_time}
           Start:          {start_time}
           End:            {end_time}
           Duration:       {duration}
           Reason:         {reason}

           Camera: Index   {camera_index}
           Sensitivity:    {sensitivity}
           ROI enabled:    {roi_enabled}

    measurement_end:
      subject: 'CVD-TRACKER{cvd_id}-{cvd_name}: Measurement ended - {timestamp}'
      body: |
        CVD-Tracker{cvd_id}-{cvd_name} Measurement Ended
        The measurement session has ended at {timestamp}.

        You can monitor the session via the web application at: {website_url}.

        Details:
           CVD-ID:         {cvd_id}
           CVD-Name:       {cvd_name}
           Website URL:    {website_url}

           Session-ID:     {session_id}
           Last motion registered at: {last_motion_time}
           Start:          {start_time}
           End:            {end_time}
           Duration:       {duration}
           Reason:         {reason}

           Camera: Index   {camera_index}
           Sensitivity:    {sensitivity}
           ROI enabled:    {roi_enabled}
    measurement_stop:
      subject: 'CVD-TRACKER{cvd_id}-{cvd_name}: Measurement stopped - {timestamp}'
      body: ' CVD-Tracker{cvd_id}-{cvd_name} Measurement Stopped The measurement session was stopped at {timestamp}.\nYou can access the web application at: {website_url}.\nDetails: CVD-ID: {cvd_id} CVD-Name: {cvd_name}\nSession-ID: {session_id} Start: {start_time} End: {end_time} Duration: {duration} Reason: {reason}\nCamera: Index {camera_index} Sensitivity: {sensitivity} ROI enabled: {roi_enabled} '
  groups: {}
  active_groups: []
  notifications:
    on_start: true
    on_end: true
    on_stop: true
  recipient_prefs: {}

# ---------------------------------------------------------------------------
# GUI
# ---------------------------------------------------------------------------
gui:
  title: CVD-Tracker-{cvd_id}-{cvd_name}
  host: localhost
  port: 8080
  auto_open_browser: false
  update_interval_ms: 100

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: INFO
  file: logs/cvd_tracker.log
  max_file_size_mb: 10
  backup_count: 5
  console_output: true

