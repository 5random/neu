# ---------------------------------------------------------------------------
# CVD-Tracker configuration (generated)
# Edit carefully — indentation defines structure
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Metadata
# ---------------------------------------------------------------------------
metadata:
  version: '2.0'
  description: CVD-Tracker
  cvd_id: 0
  cvd_name: Instanz
  released_at: '2024-04-01'

# ---------------------------------------------------------------------------
# Webcam
# ---------------------------------------------------------------------------
webcam:
  camera_index: 0
  default_resolution:
    width: 1280
    height: 720
  fps: 30
  preview_fps: 15
  preview_max_width: 1280
  preview_jpeg_quality: 70
  resolution:
    - width: 320
      height: 240
    - width: 352
      height: 288
    - width: 640
      height: 480
    - width: 800
      height: 600
    - width: 1024
      height: 768
    - width: 1280
      height: 720
    - width: 1280
      height: 960
    - width: 1280
      height: 1024
    - width: 1920
      height: 1080

# ---------------------------------------------------------------------------
# UVC Controls
# ---------------------------------------------------------------------------
uvc_controls:
  brightness: 0
  hue: 0
  contrast: 16
  saturation: 64
  sharpness: 2
  gamma: 164
  white_balance:
    auto: true
    value: 4600
  gain: 10
  backlight_compensation: 42
  exposure:
    auto: true
    value: -6

# ---------------------------------------------------------------------------
# Motion Detection
# ---------------------------------------------------------------------------
motion_detection:
  region_of_interest:
    enabled: true
    x: 94
    y: 51
    width: 1091
    height: 603
  sensitivity: 0.1
  background_learning_rate: 0.005
  min_contour_area: 252
  frame_skip: 1
  processing_max_width: 800

# ---------------------------------------------------------------------------
# Measurement
# ---------------------------------------------------------------------------
measurement:
  auto_start: false
  session_timeout_minutes: 0
  save_alert_images: true
  image_save_path: ./alerts/
  image_format: jpg
  image_quality: 85
  alert_delay_seconds: 120
  session_timeout_seconds: 0
  max_alerts_per_session: 5
  alert_check_interval: 5.0
  alert_cooldown_seconds: 180
  alert_include_snapshot: true
  inactivity_timeout_minutes: 120
  motion_summary_interval_seconds: 900
  enable_motion_summary_logs: true
  history_path: data/history

# ---------------------------------------------------------------------------
# E‑Mail
# ---------------------------------------------------------------------------
email:
  website_url: http://localhost:8080/
  website_url_source: runtime_persist
  recipients: []
  smtp_server: localhost
  smtp_port: 1025
  sender_email: CHANGE_ME@tuhh.de
  send_as_html: true
  templates:
    alert:
      subject: 'CVD-TRACKER{cvd_id}-{cvd_name}-Alert: no motion detected - {timestamp}'
      body: |-
        Movement has not been detected since {timestamp}!
        Please check the issue via the web application at: {website_url}.

        Details:
        CVD-ID: {cvd_id}
        CVD-Name: {cvd_name}
        Session-ID: {session_id}
        Last motion registered at: {last_motion_time}
        Camera: Index {camera_index}
        Sensitivity: {sensitivity}
        ROI enabled: {roi_enabled}

        {snapshot_note}
    measurement_start:
      subject: 'CVD-TRACKER{cvd_id}-{cvd_name}: Measurement started - {timestamp}'
      body: |+
        CVD-Tracker{cvd_id}-{cvd_name} Measurement Started
        A new measurement session has started at {timestamp}.

        You can monitor the session via the web application at: {website_url}.

        Details:
           CVD-ID:         {cvd_id}
           CVD-Name:       {cvd_name}
           Website URL:    {website_url}

           Session-ID:     {session_id}
           Last motion registered at: {last_motion_time}
           Start:          {start_time}
           End:            {end_time}
           Duration:       {duration}
           Reason:         {reason}

           Camera: Index   {camera_index}
           Sensitivity:    {sensitivity}
           ROI enabled:    {roi_enabled}

    measurement_end:
      subject: 'CVD-TRACKER{cvd_id}-{cvd_name}: Measurement ended - {timestamp}'
      body: |
        CVD-Tracker{cvd_id}-{cvd_name} Measurement Ended
        The measurement session has ended at {timestamp}.

        You can monitor the session via the web application at: {website_url}.

        Details:
           CVD-ID:         {cvd_id}
           CVD-Name:       {cvd_name}
           Website URL:    {website_url}

           Session-ID:     {session_id}
           Last motion registered at: {last_motion_time}
           Start:          {start_time}
           End:            {end_time}
           Duration:       {duration}
           Reason:         {reason}

           Camera: Index   {camera_index}
           Sensitivity:    {sensitivity}
           ROI enabled:    {roi_enabled}
    measurement_stop:
      subject: 'CVD-TRACKER{cvd_id}-{cvd_name}: Measurement stopped - {timestamp}'
      body: |
        CVD-Tracker{cvd_id}-{cvd_name} Measurement Stopped
        The measurement session was stopped at {timestamp}.

        You can access the web application at: {website_url}.

        Details:
           CVD-ID:         {cvd_id}
           CVD-Name:       {cvd_name}
           Website URL:    {website_url}

           Session-ID:     {session_id}
           Start:          {start_time}
           End:            {end_time}
           Duration:       {duration}
           Reason:         {reason}

           Camera: Index   {camera_index}
           Sensitivity:    {sensitivity}
           ROI enabled:    {roi_enabled}
  groups: {}
  active_groups: []
  static_recipients: []
  explicit_targeting: true
  notifications:
    on_start: true
    on_end: true
    on_stop: true
  group_prefs: {}
  recipient_prefs: {}

# ---------------------------------------------------------------------------
# GUI
# ---------------------------------------------------------------------------
gui:
  title: CVD-Tracker-{cvd_id}-{cvd_name}
  host: localhost
  port: 8080
  reverse_proxy_enabled: false
  forwarded_allow_ips: 127.0.0.1
  root_path: ''
  session_cookie_https_only: false
  auto_open_browser: false
  update_interval_ms: 100
  status_refresh_interval_ms: 1000

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: INFO
  file: logs/cvd_tracker.log
  max_file_size_mb: 10
  backup_count: 5
  console_output: true

