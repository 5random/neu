# ---------------------------------------------------------------------------
# CVD-Tracker configuration (generated)
# Edit carefully — indentation defines structure
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Webcam
# ---------------------------------------------------------------------------
webcam:
  camera_index: 0
  default_resolution:
    width: 640
    height: 480
  fps: 30
  resolution:
    - width: 320
      height: 240
    - width: 352
      height: 288
    - width: 640
      height: 480
    - width: 800
      height: 600
    - width: 1024
      height: 768
    - width: 1280
      height: 720
    - width: 1280
      height: 960
    - width: 1280
      height: 1024
    - width: 1920
      height: 1080

# ---------------------------------------------------------------------------
# UVC Controls
# ---------------------------------------------------------------------------
uvc_controls:
  brightness: 0
  hue: 0
  contrast: 16
  saturation: 64
  sharpness: 2
  gamma: 164
  white_balance:
    auto: true
    value: 4660
  gain: 10
  backlight_compensation: 42
  exposure:
    auto: true
    value: -6

# ---------------------------------------------------------------------------
# Motion Detection
# ---------------------------------------------------------------------------
motion_detection:
  processing_scale: 0.6
  region_of_interest:
    enabled: true
    x: 117
    y: 125
    width: 382
    height: 269
  simple_mode: true
  sensitivity: 0.6
  min_contour_area: 150
  background_learning_rate: 0.01
  brightness_threshold: 180
  min_vertical_speed: 0.8
  required_consecutive_frames: 3

  bubble_min_area: 80
  bubble_max_area: 800
  bubble_circularity_min: 0.55
  bubble_aspect_ratio_max: 1.8
  max_h_to_v_ratio: 0.7
  border_ignore_pct: 0.04
  global_brightness_skip_delta: 8.0
  saturated_value: 245
  saturated_persistence_frames: 8
  trigger_cooldown_s: 1.0
  surface_band_only: false
  surface_band_top_frac: 0.10
  surface_band_height_frac: 0.20

# ---------------------------------------------------------------------------
# Measurement
# ---------------------------------------------------------------------------
measurement:
  auto_start: false
  session_timeout_minutes: 60
  save_alert_images: true
  image_save_path: ./alerts/
  image_format: jpg
  image_quality: 85
  alert_delay_seconds: 300

# ---------------------------------------------------------------------------
# E‑Mail
# ---------------------------------------------------------------------------
email:
  website_url: http://134.28.91.48:8080
  recipients:
    - CHANGE_ME@example.com
  smtp_server: mail.tuhh.de
  smtp_port: 25
  sender_email: CHANGE_ME@tuhh.de
  templates:
    alert:
      subject: 'CVD-TRACKER-Alert: no motion detected - {timestamp}'
      body: '
        Movement has not been detected since {timestamp}!
        Please check the issue via the web application at: {website_url}.

        Details:
        Session-ID: {session_id}
        Last motion at: {last_motion_time}
        Camera: Index {camera_index}
        Sensitivity: {sensitivity}
        ROI enabled: {roi_enabled}

        Attached is the current webcam image.
        '

# ---------------------------------------------------------------------------
# GUI
# ---------------------------------------------------------------------------
gui:
  title: CVD-Tracker
  host: localhost
  port: 8080
  auto_open_browser: false
  update_interval_ms: 100

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: INFO
  file: logs/cvd_tracker.log
  max_file_size_mb: 10
  backup_count: 5
  console_output: true
