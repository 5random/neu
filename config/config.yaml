# ---------------------------------------------------------------------------
# CVD-Tracker configuration (generated)
# Edit carefully — indentation defines structure
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Metadata
# ---------------------------------------------------------------------------
metadata:
  version: 1.0
  description: CVD-Tracker
  cvd_id: 0
  author: Your Name
  released_at: 2023-01-01

# ---------------------------------------------------------------------------
# Webcam
# ---------------------------------------------------------------------------
webcam:
  camera_index: 0
  default_resolution:
    width: 640
    height: 480
  fps: 30
  resolution:
    - width: 320
      height: 240
    - width: 352
      height: 288
    - width: 640
      height: 480
    - width: 800
      height: 600
    - width: 1024
      height: 768
    - width: 1280
      height: 720
    - width: 1280
      height: 960
    - width: 1280
      height: 1024
    - width: 1920
      height: 1080

# ---------------------------------------------------------------------------
# UVC Controls
# ---------------------------------------------------------------------------
uvc_controls:
  brightness: 0
  hue: 0
  contrast: 16
  saturation: 64
  sharpness: 2
  gamma: 164
  white_balance:
    auto: true
    value: 4660
  gain: 10
  backlight_compensation: 42
  exposure:
    auto: true
    value: -6

# ---------------------------------------------------------------------------
# Motion Detection
# ---------------------------------------------------------------------------
motion_detection:
  region_of_interest:
    enabled: true
    x: 117
    y: 125
    width: 382
    height: 269
  sensitivity: 0.2
  background_learning_rate: 0.005
  min_contour_area: 252

# ---------------------------------------------------------------------------
# Measurement
# ---------------------------------------------------------------------------
measurement:
  auto_start: false
  session_timeout_minutes: 60
  save_alert_images: true
  image_save_path: ./alerts/
  image_format: jpg
  image_quality: 85
  alert_delay_seconds: 300

# ---------------------------------------------------------------------------
# E‑Mail
# ---------------------------------------------------------------------------
email:
  website_url: http://134.28.91.48:8080
  recipients:
    - CHANGE_ME@example.com
  smtp_server: mail.tuhh.de
  smtp_port: 25
  sender_email: CHANGE_ME@tuhh.de
  templates:
    alert:
      subject: 'CVD-TRACKER{cvd_id}-Alert: no motion detected - {timestamp}'
      body: '
        CVD-Tracker{cvd_id} Alert!
        Movement has not been detected since {timestamp}!
        Please check the issue via the web application at: {website_url}.

        Details:
        CVD-ID: {cvd_id}
        Session-ID: {session_id}
        Last motion at: {last_motion_time}
        Camera: Index {camera_index}
        Sensitivity: {sensitivity}
        ROI enabled: {roi_enabled}

        Attached is the current webcam image.
        '
    test:
      subject: 'CVD-TRACKER: Test email - {timestamp}'
      body: '
        This is a test email from CVD-Tracker{cvd_id} sent at {timestamp}.
        If you received this email, the email configuration is correct.

        You can access the web application at: {website_url}.

        Details:
        CVD-ID: {cvd_id}
        Camera: Index {camera_index}
        '
    measurement_start:
      subject: 'CVD-TRACKER{cvd_id}: Measurement started - {timestamp}'
      body: '
        CVD-Tracker{cvd_id} Measurement Started
        A new measurement session has started at {timestamp}.

        You can monitor the session via the web application at: {website_url}.

        Details:
        CVD-ID: {cvd_id}
        Session-ID: {session_id}
        Camera: Index {camera_index}
        Sensitivity: {sensitivity}
        ROI enabled: {roi_enabled}
        '
    measurement_end:
      subject: 'CVD-TRACKER{cvd_id}: Measurement ended - {timestamp}'
      body: '
        CVD-Tracker{cvd_id} Measurement Ended
        The measurement session has ended at {timestamp}.

        You can review the session via the web application at: {website_url}.

        Details:
        CVD-ID: {cvd_id}
        Session-ID: {session_id}
        Camera: Index {camera_index}
        Sensitivity: {sensitivity}
        ROI enabled: {roi_enabled}
        '

# ---------------------------------------------------------------------------
# GUI
# ---------------------------------------------------------------------------
gui:
  title: CVD-Tracker
  host: localhost
  port: 8080
  auto_open_browser: false
  update_interval_ms: 100

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: INFO
  file: logs/cvd_tracker.log
  max_file_size_mb: 10
  backup_count: 5
  console_output: true
