
metadata:
  version: '1.0'
  description: test
  cvd_id: 1
  cvd_name: test
  released_at: '2023-01-01'
webcam:
  camera_index: 0
  default_resolution: {width: 640, height: 480}
  fps: 30
  resolution:
    - {width: 640, height: 480}
uvc_controls:
  brightness: 0
  hue: 0
  contrast: 16
  saturation: 64
  sharpness: 2
  gamma: 164
  white_balance: {auto: true, value: 4000}
  gain: 10
  backlight_compensation: 42
  exposure: {auto: true, value: -6}
motion_detection:
  region_of_interest: {enabled: false, x: 0, y: 0, width: 10, height: 10}
  sensitivity: 0.1
  background_learning_rate: 0.005
  min_contour_area: 252
measurement:
  auto_start: false
  session_timeout_minutes: 60
  session_timeout_seconds: 3600
  save_alert_images: false
  image_save_path: './alerts/'
  image_format: jpg
  image_quality: 85
  alert_delay_seconds: 300
  max_alerts_per_session: 5
  alert_check_interval: 5.0
  alert_cooldown_seconds: 300
  alert_include_snapshot: true
  inactivity_timeout_minutes: 60
  motion_summary_interval_seconds: 60
  enable_motion_summary_logs: true
email: []
gui:
  title: test
  host: localhost
  port: 8080
  auto_open_browser: false
  update_interval_ms: 100
  reverse_proxy_enabled: false
  forwarded_allow_ips: '127.0.0.1'
  root_path: ''
  session_cookie_https_only: false
logging:
  level: INFO
  file: '.review_tmp_invalid_config2/valid.log'
  max_file_size_mb: 1
  backup_count: 1
  console_output: true
