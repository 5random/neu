metadata:
  version: '1.0'
  description: CVD-Tracker
  cvd_id: 0
  cvd_name: AFTER_FIX
  released_at: '2023-01-01'
webcam:
  camera_index: 0
  default_resolution:
    width: 1920
    height: 1080
  fps: 30
  resolution:
  - width: 320
    height: 240
  - width: 352
    height: 288
  - width: 640
    height: 480
  - width: 800
    height: 600
  - width: 1024
    height: 768
  - width: 1280
    height: 720
  - width: 1280
    height: 960
  - width: 1280
    height: 1024
  - width: 1920
    height: 1080
uvc_controls:
  brightness: 0
  hue: 0
  contrast: 16
  saturation: 64
  sharpness: 2
  gamma: 164
  white_balance:
    auto: true
    value: 4000
  gain: 10
  backlight_compensation: 42
  exposure:
    auto: true
    value: -6
motion_detection:
  region_of_interest:
    enabled: false
    x: 100
    y: 100
    width: 300
    height: 200
  sensitivity: 0.1
  background_learning_rate: 0.005
  min_contour_area: 252
measurement:
  auto_start: false
  session_timeout_minutes: 60
  save_alert_images: true
  image_save_path: ./alerts/
  image_format: jpg
  image_quality: 85
  alert_delay_seconds: 300
  session_timeout_seconds: 3600
  max_alerts_per_session: 5
  alert_check_interval: 5.0
  alert_cooldown_seconds: 300
  alert_include_snapshot: true
  inactivity_timeout_minutes: 60
  motion_summary_interval_seconds: 60
  enable_motion_summary_logs: true
  history_path: data/history
email:
  website_url: http://localhost:8080/
  recipients:
  - user@example.com
  smtp_server: smtp.example.com
  smtp_port: 25
  sender_email: sender@example.com
  templates:
    alert:
      subject: 'CVD-TRACKER{cvd_id}-{cvd_name}-Alert: no motion detected - {timestamp}'
      body: 'Movement has not been detected since {timestamp}!

        Please check the issue via the web application at: {website_url}.


        Details:

        CVD-ID: {cvd_id}

        CVD-Name: {cvd_name}

        Session-ID: {session_id}

        Last motion at: {last_motion_time}

        Camera: Index {camera_index}

        Sensitivity: {sensitivity}

        ROI enabled: {roi_enabled}


        {snapshot_note}'
    measurement_start:
      subject: 'CVD-TRACKER{cvd_id}-{cvd_name}: Measurement started - {timestamp}'
      body: "CVD-Tracker{cvd_id}-{cvd_name} Measurement Started\nA new measurement\
        \ session has started at {timestamp}.\n\nYou can monitor the session via the\
        \ web application at: {website_url}.\n\nDetails:\n   CVD-ID:         {cvd_id}\n\
        \   CVD-Name:       {cvd_name}\n   Website URL:    {website_url}\n\n   Session-ID:\
        \     {session_id}\n   Last motion at: {last_motion_time}\n   Start:     \
        \     {start_time}\n   End:            {end_time}\n   Duration:       {duration}\n\
        \   Reason:         {reason}\n\n   Camera: Index   {camera_index}\n   Sensitivity:\
        \    {sensitivity}\n   ROI enabled:    {roi_enabled}\n\n"
    measurement_end:
      subject: 'CVD-TRACKER{cvd_id}-{cvd_name}: Measurement ended - {timestamp}'
      body: "CVD-Tracker{cvd_id}-{cvd_name} Measurement Ended\nThe measurement session\
        \ has ended at {timestamp}.\n\nYou can monitor the session via the web application\
        \ at: {website_url}.\n\nDetails:\n   CVD-ID:         {cvd_id}\n   CVD-Name:\
        \       {cvd_name}\n   Website URL:    {website_url}\n\n   Session-ID:   \
        \  {session_id}\n   Last motion at: {last_motion_time}\n   Start:        \
        \  {start_time}\n   End:            {end_time}\n   Duration:       {duration}\n\
        \   Reason:         {reason}\n\n   Camera: Index   {camera_index}\n   Sensitivity:\
        \    {sensitivity}\n   ROI enabled:    {roi_enabled}\n\n"
  send_as_html: false
  website_url_source: runtime_persist
  groups: {}
  active_groups: []
  static_recipients:
  - user@example.com
  explicit_targeting: true
  notifications:
    on_start: false
    on_end: false
    on_stop: false
  group_prefs: {}
  recipient_prefs: {}
gui:
  title: CVD-Tracker
  host: localhost
  port: 8080
  auto_open_browser: false
  update_interval_ms: 100
  reverse_proxy_enabled: false
  forwarded_allow_ips: 127.0.0.1
  root_path: ''
  session_cookie_https_only: false
logging:
  level: INFO
  file: logs/cvd_tracker.log
  max_file_size_mb: 10
  backup_count: 5
  console_output: true
