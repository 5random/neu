# Help documentation for the Application
help:
  title: "Application Help"
  sections:
    - title: "Getting Started"
      link: "/"
      content: |
        Welcome to the CVD-Tracker Application! This guide will help you get started with the basic features and functionalities.
        
        ## Initial Setup
        The application is typically pre-installed. To start it, run the `main.py` script or the provided executable.
        
        ## First Steps
        After launch, the application opens the Dashboard in your default web browser.
        - **Dashboard**: View the live camera feed, start/stop measurement sessions, and see the system status.
        - **Settings**: Configure camera, motion detection, email notifications, and system preferences.

    - title: "Camera Settings"
      link: "/settings#camera"
      content: |
        The Camera Settings allow you to configure the camera parameters for optimal performance.

        ## How to Access Camera Settings
        1. Navigate to the 'Settings' menu at the top right corner of the home screen.
        2. Select 'Camera Settings' from the dropdown menu.
        3. Adjust the settings as needed. Changes are applied immediately.

        ## How to Adjust Camera Settings for Optimal Performance
        - **Resolution**: Choose a resolution that balances quality and performance. 
        - **Frame Rate**: Set the frame rate (e.g., 30fps) for smooth video.
        - **Backlight Compensation**: Find a balance that enhances visibility without overexposing the image.
        - **White Balance**: Use 'Auto' for general use. For specific lighting conditions, manually adjust the color temperature.
        - **Exposure**: Set to 'Auto' for most scenarios. Manual adjustment can help in difficult lighting.
        - **Brightness and Contrast**: Adjust these settings to improve image clarity.
        - **Gain**: Control gain settings to manage low-light performance. Higher gain can introduce noise.
        - **Gamma**: Modify gamma settings to adjust the midtones of the image.
        - **Sharpness**: Adjust sharpness to enhance details.
        - **Saturation**: Increase saturation for more vibrant colors. Note: This has **no effect** on motion detection (which uses grayscale).
        - **Hue**: Adjust hue to correct color tones. Note: This has **no effect** on motion detection.

        ## Save and Reset
        - Settings are saved automatically or via the 'Save' button depending on the control.
        - To revert to default settings, click the 'Reset to Default' button.

    - title: "Motion Detection Settings"
      link: "/settings#motion"
      content: |
        Motion Detection Settings allow you to configure how the application detects motion in the camera feed.

        ## How to Access Motion Detection Settings
        1. Navigate to the 'Settings' menu.
        2. Go to the 'Motion Detection' section.
        3. Enable/Disable ROI using the checkbox.
        4. Click the 'Edit' (Crop icon) button to open the ROI editor.

        ## How to Adjust Motion Detection Settings
        - **ROI (Region of Interest)**: Define a specific area to monitor. This reduces false alarms from background movement (e.g., trees outside a window).
        - **Sensitivity**: Adjust the slider (0-100%). Higher sensitivity detects smaller movements but increases false positives.
        - **Learning Rate**: Controls how fast the system adapts to lighting changes.

        ### How to Adjust the Region of Interest (ROI)
        1. Open the ROI Editor.
        2. **Click once** on the video feed to set the top-left corner.
        3. **Click a second time** to set the bottom-right corner.
        4. The selected area will be marked with a rectangle.
        5. Click 'Save' to apply the ROI.
        6. Use 'Reset' to clear the selection.

        ## Tips
        - Test the settings by moving within the defined ROI. The "Motion Detected" status on the Dashboard will update in real-time.
        - If you get too many false alarms, try reducing sensitivity or redefining the ROI.

    - title: "Measurement & Sessions"
      link: "/"
      content: |
        The core function of the CVD-Tracker is to monitor for *lack of motion* during a specific session.

        ## Starting a Session
        1. On the Dashboard, set the desired **Duration** (e.g., 60 minutes).
        2. Click **Start Measurement**.
        3. The system is now armed.

        ## Alert Logic
        - If **no motion** is detected for the configured **Alert Delay** (e.g., 5 minutes), an alarm is triggered.
        - An email notification (with snapshot) is sent to the configured recipients.
        - After an alarm, the system enters a **Cooldown** period before it can trigger another alarm.

    - title: "E-Mail Notifications"
      link: "/settings#email"
      content: |
        Configure email alerts for motion timeouts and session events.

        ## Configuration Steps
        1. Go to **Settings > E-Mail**.
        2. **SMTP Settings**: Enter your mail server details.
           - *Note for TUHH users*: Use `mail.tuhh.de`, Port 25. Authentication is typically not required within the intranet.
        3. **Recipients**: Add email addresses to the list.
        4. **Groups**: You can organize recipients into groups (e.g., "Admins", "Users") and activate specific groups for the current session.
        5. **Templates**: Customize the subject and body of the alert emails.

        ## Testing
        - Use the **Send Test Email** button to verify your configuration.
        - Check your spam folder if the test email doesn't arrive.

    - title: "System & Maintenance"
      link: "/settings#system"
      content: |
        ## Configuration Management
        - You can download the current `config.yaml` for backup purposes via **Settings > Configuration**.
        
        ## Updates
        - Go to **Settings > Update**.
        - The system checks for updates via Git.
        - Click **Check & Update** to pull the latest version and restart the application.
        
        ## Logs
        - Go to **Settings > Logs**.
        - View live logs to troubleshoot issues.
        - Download logs as a ZIP file for external analysis.
        - **Log Levels**:
          - **INFO**: Normal operation events.
          - **WARNING**: Potential issues (e.g., camera lag).
          - **ERROR**: Functional failures (e.g., email failed to send).

    - title: "Troubleshooting"
      link: "/settings#logs"
      content: |
        **Common Issues:**
        
        - **Camera not working**: Check USB connection. Try a different USB port. Restart the app.
        - **No Emails**: Verify SMTP settings. Check if the firewall blocks Port 25.
        - **False Alarms**: Reduce Motion Sensitivity. Check ROI for flickering lights or moving shadows.
        
        If problems persist, check the **Logs** for detailed error messages.